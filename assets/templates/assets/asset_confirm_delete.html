{% extends 'base.html' %}

{% block title %}Potwierdź usunięcie | IT Assets{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow border-danger">
        <div class="card-body text-center p-5">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
            <h3 class="mt-3 mb-4">Czy na pewno chcesz usunąć ten sprzęt?</h3>
            
            <p class="lead"><strong>{{ asset.name }}</strong> (S/N: {{ asset.serial_number }})</p>
            <p class="text-muted mb-4">Tej operacji nie można cofnąć.</p>
            
            <form method="POST">
                {% csrf_token %}
                <a href="{% url 'asset_update' asset.pk %}" class="btn btn-secondary px-4 me-2">Anuluj</a>
                <button type="submit" class="btn btn-danger px-4">Tak, usuń bezpowrotnie</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
