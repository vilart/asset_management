<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dodaj Sprzęt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 800px;">
        <h2 class="mb-4">Dodaj nowy sprzęt IT</h2>
        
        <form method="POST" class="card p-4 shadow-sm">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    
                    {% if field.name == 'device_model' %}
                        <div class="input-group">
                            {{ field }}
                            <button type="button" class="btn btn-outline-success"
                                    hx-get="{% url 'add_device_model_htmx' %}"
                                    hx-target="#dialog"
                                    data-bs-toggle="modal"
                                    data-bs-target="#modal">
                                + Dodaj Model
                            </button>
                        </div>
                    {% else %}
                        {{ field }}
                    {% endif %}
                </div>
            {% endfor %}
            
            <div class="mt-4">
                <a href="{% url 'asset_list' %}" class="btn btn-secondary">Anuluj</a>
                <button type="submit" class="btn btn-primary">Zapisz Sprzęt</button>
            </div>
        </form>
    </div>

    <div id="modal" class="modal fade" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" id="dialog">
                </div>
        </div>
    </div>

    <script>
        document.body.addEventListener('closeModal', function() {
            var myModalEl = document.getElementById('modal');
            var modal = bootstrap.Modal.getInstance(myModalEl);
            modal.hide();
        });
    </script>
</body>
</html>
